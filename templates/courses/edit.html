{% extends "base.html" %}
{% block title %}Edit Course · LMP{% endblock %}
{% block content %}
<div class="max-w-2xl mx-auto space-y-md">
  <h1 class="font-geist text-headline-lg text-on-surface dark:text-inverse-on-surface">Edit course</h1>

  <form action="{{ url_for('courses.edit', course_id=course.course_id) }}" method="post"
        class="p-md rounded-xl bg-surface-container-lowest dark:bg-[#1d2123] border border-outline-variant/40 shadow-card space-y-sm">
    <div class="space-y-base">
      <label class="font-geist text-label-sm text-on-surface-variant block">Course name</label>
      <input name="course_name" value="{{ course.course_name }}" required
             class="w-full px-md py-sm rounded-lg bg-surface-container-low dark:bg-inverse-surface border-transparent focus:bg-white dark:focus:bg-[#14181b] focus:border-primary focus:ring-0 outline-none font-inter text-body-md" />
    </div>
    <div class="space-y-base">
      <label class="font-geist text-label-sm text-on-surface-variant block">Course code</label>
      <input name="course_code" value="{{ course.course_code or '' }}" maxlength="20"
             class="w-full px-md py-sm rounded-lg bg-surface-container-low dark:bg-inverse-surface border-transparent focus:bg-white dark:focus:bg-[#14181b] focus:border-primary focus:ring-0 outline-none font-inter text-body-md uppercase tracking-wider" />
    </div>
    <div class="space-y-base">
      <label class="font-geist text-label-sm text-on-surface-variant block">Description</label>
      <textarea name="course_description" rows="4"
                class="w-full px-md py-sm rounded-lg bg-surface-container-low dark:bg-inverse-surface border-transparent focus:bg-white dark:focus:bg-[#14181b] focus:border-primary focus:ring-0 outline-none font-inter text-body-md">{{ course.course_description or '' }}</textarea>
    </div>
    <div class="flex justify-end gap-xs pt-base">
      <a href="{{ url_for('courses.detail', course_id=course.course_id) }}" class="px-md py-sm rounded-lg font-geist text-label-md text-on-surface-variant hover:bg-surface-container">Cancel</a>
      <button class="px-md py-sm bg-primary-container text-on-primary-container rounded-lg font-geist text-label-md hover:shadow-hover active:scale-[0.98] transition-all">Save changes</button>
    </div>
  </form>

  <form action="{{ url_for('courses.delete', course_id=course.course_id) }}" method="post"
        onsubmit="return confirm('Delete this course? All assignments, submissions, quizzes, and announcements will be permanently removed.');"
        class="p-md rounded-xl bg-error-container/30 border border-error/30">
    <h2 class="font-geist text-headline-sm text-on-error-container">Danger zone</h2>
    <p class="font-inter text-body-sm text-on-error-container/80 mt-base mb-sm">Deleting a course cannot be undone.</p>
    <button class="px-md py-sm bg-error text-on-error rounded-lg font-geist text-label-md hover:opacity-90 transition">Delete course</button>
  </form>
</div>
{% endblock %}
