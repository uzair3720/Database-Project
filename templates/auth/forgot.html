{% extends "auth/_layout.html" %}
{% block title %}Forgot password · LMP{% endblock %}
{% block auth_form %}
  <header class="mb-md">
    <h2 class="font-geist text-headline-lg text-on-surface dark:text-inverse-on-surface mb-base">Reset password</h2>
    <p class="font-inter text-body-md text-on-surface-variant">Enter your email and we'll send you a reset link.</p>
  </header>
  <form action="{{ url_for('auth.forgot') }}" method="post" class="space-y-md">
    <div class="space-y-base">
      <label class="font-geist text-label-sm text-on-surface-variant block">Email</label>
      <input name="email" type="email" required autofocus
             class="w-full px-md py-sm rounded-lg bg-surface-container-low dark:bg-inverse-surface
                    border-transparent focus:bg-white dark:focus:bg-[#14181b] focus:border-primary focus:ring-0
                    font-inter text-body-md outline-none" />
    </div>
    <button class="w-full bg-primary-container text-on-primary-container py-md rounded-lg
                   font-geist text-label-md hover:shadow-hover active:scale-[0.98] transition-all">
      Send reset link
    </button>
  </form>
  <p class="text-center font-inter text-body-sm text-on-surface-variant pt-md">
    <a href="{{ url_for('auth.login') }}" class="font-geist text-label-md text-primary hover:underline">Back to sign in</a>
  </p>
{% endblock %}
